name: Apply icon data URL fix

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/icon-data-urls'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/icon-data-urls
          fetch-depth: 0
      - run: python3 scripts/apply_icon_data_url_fix.py
      - run: npm ci && npm run build
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/src/lib.rs src/controlStripModel.ts
          git commit -m "Serve local icons as data URLs"
          git push origin HEAD:agent/icon-data-urls
