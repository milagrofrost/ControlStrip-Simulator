name: Apply pin and unpin feature

on:
  push:
    branches:
      - agent/pin-unpin-context-menu
    paths:
      - scripts/apply-pin-unpin-feature.py
      - .github/workflows/apply-pin-unpin-feature.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pin-unpin-context-menu
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply source changes
        run: python scripts/apply-pin-unpin-feature.py
      - name: Remove one-time patcher
        run: git rm scripts/apply-pin-unpin-feature.py .github/workflows/apply-pin-unpin-feature.yml
      - name: Commit feature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/lib.rs src/controlStripModel.ts src/ControlStrip.ts src/main.ts
          git commit -m "Add Pin to Strip and Unpin from Strip actions"
          git push origin HEAD:agent/pin-unpin-context-menu
