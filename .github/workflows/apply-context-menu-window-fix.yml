name: Apply context menu window fix

on:
  push:
    branches:
      - agent/pin-unpin-context-menu

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pin-unpin-context-menu
      - name: Apply source fix
        shell: python
        run: |
          from pathlib import Path

          main_path = Path('src/main.ts')
          main = main_path.read_text()

          main = main.replace(
              "  let items = model.items;\n  const strip = createControlStrip(items, {",
              "  let items = model.items;\n  let latestRunningWindows: Parameters<typeof applyRunningWindowsToItems>[1] = [];\n  let contextMenu: HTMLDivElement | null = null;\n  let stripContentSize = { width: 1, height: 24 };\n\n  const strip = createControlStrip(items, {",
              1,
          )

          main = main.replace(
              "    onContentResize: ({ width, height }) => {\n      resizeStripWindow(width, height);\n    }",
              "    onContentResize: ({ width, height }) => {\n      stripContentSize = { width, height };\n      if (!contextMenu) {\n        void resizeStripWindow(width, height);\n      }\n    }",
              1,
          )

          main = main.replace(
              "  let latestRunningWindows: Parameters<typeof applyRunningWindowsToItems>[1] = [];\n  let contextMenu: HTMLDivElement | null = null;\n\n",
              "",
              1,
          )

          main = main.replace(
              "  const closeContextMenu = (): void => {\n    contextMenu?.remove();\n    contextMenu = null;\n  };",
              "  const closeContextMenu = (): void => {\n    contextMenu?.remove();\n    contextMenu = null;\n    void resizeStripWindow(stripContentSize.width, stripContentSize.height);\n  };",
              1,
          )

          main = main.replace(
              "  strip.addEventListener('contextmenu', (event) => {",
              "  strip.addEventListener('contextmenu', async (event) => {",
              1,
          )

          main = main.replace(
              "    menu.style.zIndex = '10000';",
              "    menu.style.zIndex = '10000';\n    menu.style.visibility = 'hidden';",
              1,
          )

          old_positioning = """    const margin = 4;
    const rect = menu.getBoundingClientRect();
    const maxLeft = Math.max(margin, window.innerWidth - rect.width - margin);
    const left = Math.min(Math.max(event.clientX, margin), maxLeft);
    const pointerGap = 2;
    const top = Math.max(margin, event.clientY - rect.height - pointerGap);

    menu.style.left = `${left}px`;
    menu.style.top = `${top}px`;
    contextMenu = menu;
"""
          new_positioning = """    const margin = 4;
    const pointerGap = 2;
    const rect = menu.getBoundingClientRect();
    const expandedHeight = stripContentSize.height + rect.height + pointerGap + margin;

    contextMenu = menu;
    await resizeStripWindow(stripContentSize.width, expandedHeight);
    await new Promise<void>((resolve) => window.requestAnimationFrame(() => resolve()));

    const maxLeft = Math.max(margin, window.innerWidth - rect.width - margin);
    const left = Math.min(Math.max(event.clientX, margin), maxLeft);
    const top = Math.max(
      margin,
      window.innerHeight - stripContentSize.height - rect.height - pointerGap
    );

    menu.style.left = `${left}px`;
    menu.style.top = `${top}px`;
    menu.style.visibility = 'visible';
"""
          if old_positioning not in main:
              raise SystemExit('Expected context-menu positioning block not found')
          main = main.replace(old_positioning, new_positioning, 1)
          main_path.write_text(main)

          model_path = Path('src/controlStripModel.ts')
          model = model_path.read_text()
          old_resize = """export function resizeStripWindow(width: number, height: number): void {
  if (!isTauri()) {
    return;
  }

  if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
    return;
  }

  void invoke('resize_strip_window', { width, height }).catch((error) => {
    console.warn('Control Strip: failed to resize strip window', error);
  });
}
"""
          new_resize = """export async function resizeStripWindow(width: number, height: number): Promise<void> {
  if (!isTauri()) {
    return;
  }

  if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
    return;
  }

  try {
    await invoke('resize_strip_window', { width, height });
  } catch (error) {
    console.warn('Control Strip: failed to resize strip window', error);
  }
}
"""
          if old_resize not in model:
              raise SystemExit('Expected resizeStripWindow implementation not found')
          model_path.write_text(model.replace(old_resize, new_resize, 1))

          rust_path = Path('src-tauri/src/lib.rs')
          rust = rust_path.read_text()
          duplicate = """    #[serde(default)]
    window_filters: WindowFiltersConfig,
    #[serde(default)]
    window_filters: WindowFiltersConfig,
"""
          single = """    #[serde(default)]
    window_filters: WindowFiltersConfig,
"""
          if duplicate in rust:
              rust = rust.replace(duplicate, single, 1)
              rust_path.write_text(rust)
      - name: Commit source fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/main.ts src/controlStripModel.ts src-tauri/src/lib.rs
          git diff --cached --quiet && exit 0
          git commit -m "fix: expand native window for context menu"
          git push origin HEAD:agent/pin-unpin-context-menu
