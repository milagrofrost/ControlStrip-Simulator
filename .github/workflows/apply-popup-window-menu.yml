name: Apply popup window menu

on:
  push:
    branches: [agent/icon-data-urls]

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/icon-data-urls
          fetch-depth: 0
      - run: python3 scripts/apply_popup_window_menu.py
      - run: npm ci && npm run build
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/lib.rs src-tauri/capabilities/default.json src/controlStripModel.ts src/ControlStrip.ts src/main.ts src/windowMenu.ts src/WindowMenu.css
          git commit -m "Render hold menu in a separate window"
          git push origin HEAD:agent/icon-data-urls
