name: Apply popup behavior fix

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/icon-data-urls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/icon-data-urls
          fetch-depth: 0
      - run: python3 scripts/apply_popup_behavior_fix.py
      - run: npm ci && npm run build
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/lib.rs src/windowMenu.ts src/WindowMenu.css
          git commit -m "Fix popup menu sizing and dismissal"
          git push origin HEAD:agent/icon-data-urls
