name: Cleanup popup diagnostics

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/icon-data-urls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/icon-data-urls
          fetch-depth: 0
      - run: python3 scripts/cleanup_popup_diagnostics.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ControlStrip.ts src/controlStripModel.ts src-tauri/src/lib.rs
          git commit -m "Remove popup coordinate diagnostics"
          git push origin HEAD:agent/icon-data-urls
