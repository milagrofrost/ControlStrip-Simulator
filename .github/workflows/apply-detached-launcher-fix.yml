name: Apply detached launcher fix

on:
  push:
    branches:
      - agent/detach-launched-apps

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/detach-launched-apps

      - name: Patch launcher implementation
        shell: python
        run: |
          from pathlib import Path

          path = Path('src-tauri/src/lib.rs')
          text = path.read_text()

          text = text.replace(
              'use std::process::Command;',
              'use std::process::{Command, Stdio};',
              1,
          )

          old = '''fn launch_desktop_file(desktop_file: &str) -> Result<(), String> {
    let gio_result = spawn_launcher("gio", &["launch", desktop_file]);
    if gio_result.is_ok() {
        eprintln!("Control Strip: launched {desktop_file} with gio");
        return Ok(());
    }

    let dex_result = spawn_launcher("dex", &[desktop_file]);
    if dex_result.is_ok() {
        eprintln!("Control Strip: launched {desktop_file} with dex");
        return Ok(());
    }

    Err(format!(
        "Failed to launch {desktop_file}. gio: {}; dex: {}",
        gio_result.unwrap_err(),
        dex_result.unwrap_err()
    ))
}

fn spawn_launcher(program: &str, args: &[&str]) -> Result<(), String> {
    match Command::new(program).args(args).spawn() {
        Ok(_child) => Ok(()),
        Err(error) => Err(format!("{program} could not be started: {error}")),
    }
}
'''

          new = '''fn launch_desktop_file(desktop_file: &str) -> Result<(), String> {
    let gio_result = spawn_launcher("gio", &["launch", desktop_file]);
    if gio_result.is_ok() {
        eprintln!("Control Strip: handed {desktop_file} to gio");
        return Ok(());
    }

    let desktop_id = Path::new(desktop_file)
        .file_name()
        .and_then(|value| value.to_str())
        .ok_or_else(|| format!("Desktop file name is not valid UTF-8: {desktop_file}"))?;
    let gtk_result = spawn_launcher("gtk-launch", &[desktop_id]);
    if gtk_result.is_ok() {
        eprintln!("Control Strip: handed {desktop_file} to gtk-launch");
        return Ok(());
    }

    Err(format!(
        "Failed to hand {desktop_file} to the desktop launcher. gio: {}; gtk-launch: {}",
        gio_result.unwrap_err(),
        gtk_result.unwrap_err()
    ))
}

fn spawn_launcher(program: &str, args: &[&str]) -> Result<(), String> {
    Command::new(program)
        .args(args)
        .stdin(Stdio::null())
        .stdout(Stdio::null())
        .stderr(Stdio::null())
        .spawn()
        .map(|_child| ())
        .map_err(|error| format!("{program} could not be started: {error}"))
}
'''

          if old not in text:
              raise SystemExit('Expected launcher implementation not found')

          path.write_text(text.replace(old, new, 1))

      - name: Validate Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src-tauri/src/lib.rs
          git diff --cached --quiet && exit 0
          git commit -m "Detach desktop application launches"
          git push origin HEAD:agent/detach-launched-apps
