name: Apply ignore menu patch

on:
  push:
    branches:
      - agent/pin-unpin-context-menu

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pin-unpin-context-menu
      - name: Apply source patch
        shell: python
        run: |
          from pathlib import Path

          lib = Path('src-tauri/src/lib.rs')
          text = lib.read_text()
          text = text.replace(
              '    #[serde(default)]\n    pinned_apps: Vec<PinnedAppConfig>,',
              '    #[serde(default)]\n    window_filters: WindowFiltersConfig,\n    #[serde(default)]\n    pinned_apps: Vec<PinnedAppConfig>,'
          )
          text = text.replace(
              '            screen_corner: ScreenCornerConfig::default(),\n            pinned_apps: Vec::new(),',
              '            screen_corner: ScreenCornerConfig::default(),\n            window_filters: WindowFiltersConfig::default(),\n            pinned_apps: Vec::new(),'
          )
          marker = '#[derive(Clone, Debug, Deserialize, Serialize)]\nstruct PinnedAppConfig {'
          insert = '''#[derive(Clone, Debug, Default, Deserialize, Serialize)]
          #[serde(default)]
          struct WindowFiltersConfig {
              #[serde(default, skip_serializing_if = "Vec::is_empty")]
              exclude_titles: Vec<String>,
              #[serde(default, skip_serializing_if = "Vec::is_empty")]
              exclude_wm_classes: Vec<String>,
          }

          '''
          if 'struct WindowFiltersConfig' not in text:
              text = text.replace(marker, insert + marker)
          command_marker = '#[tauri::command]\nfn resolve_desktop_file(wm_class: String) -> Result<String, String> {'
          command = '''#[tauri::command]
          fn ignore_wm_class(wm_class: String) -> Result<(), String> {
              let normalized = wm_class.trim();
              if normalized.is_empty() {
                  return Err("Window class is empty".to_string());
              }
              let config_path = ensure_config_file()?;
              let mut config = load_config(&config_path)?;
              if !config.window_filters.exclude_wm_classes.iter().any(|value| value.eq_ignore_ascii_case(normalized)) {
                  config.window_filters.exclude_wm_classes.push(normalized.to_string());
              }
              let yaml = serde_yaml::to_string(&config)
                  .map_err(|error| format!("Failed to serialize {}: {error}", config_path.display()))?;
              fs::write(&config_path, yaml)
                  .map_err(|error| format!("Failed to write {}: {error}", config_path.display()))
          }

          '''
          if 'fn ignore_wm_class(' not in text:
              text = text.replace(command_marker, command + command_marker)
          text = text.replace(
              '            set_app_pinned,\n            resolve_desktop_file,',
              '            set_app_pinned,\n            ignore_wm_class,\n            resolve_desktop_file,'
          )
          lib.write_text(text)

          model = Path('src/controlStripModel.ts')
          text = model.read_text()
          marker = 'export async function resolveDesktopFile(wmClass: string): Promise<string> {'
          addition = '''export async function ignoreWmClass(wmClass: string): Promise<void> {
            if (!isTauri()) return;
            await invoke('ignore_wm_class', { wmClass });
          }

          '''
          if 'export async function ignoreWmClass' not in text:
              text = text.replace(marker, addition + marker)
          model.write_text(text)

          main = Path('src/main.ts')
          text = main.read_text()
          text = text.replace(
              '  focusAppWindows,\n  launchPinnedApp,',
              '  focusAppWindows,\n  ignoreWmClass,\n  launchPinnedApp,'
          )
          old = '    menu.append(action);\n    document.body.append(menu);'
          new = '''    menu.append(action);

              const ignoreAction = document.createElement('button');
              ignoreAction.type = 'button';
              ignoreAction.textContent = 'Ignore from Strip';
              ignoreAction.style.display = 'block';
              ignoreAction.style.width = '100%';
              ignoreAction.style.border = '0';
              ignoreAction.style.borderTop = '1px solid #999';
              ignoreAction.style.background = 'transparent';
              ignoreAction.style.padding = '4px 10px';
              ignoreAction.style.textAlign = 'left';
              ignoreAction.disabled = !(item.wmClass?.trim());
              ignoreAction.addEventListener('click', async () => {
                const wmClass = item.wmClass?.trim();
                if (!wmClass) return;
                ignoreAction.disabled = true;
                try {
                  await ignoreWmClass(wmClass);
                  latestRunningWindows = latestRunningWindows.filter((windowItem) => {
                    const candidate = windowItem.wm_class.trim() || windowItem.wm_class_instance.trim();
                    return candidate.toLowerCase() !== wmClass.toLowerCase();
                  });
                  await refreshItems();
                } catch (error) {
                  console.error('Control Strip: failed to ignore app', error);
                } finally {
                  closeContextMenu();
                }
              });
              menu.append(ignoreAction);
              document.body.append(menu);'''
          if "ignoreAction.textContent = 'Ignore from Strip'" not in text:
              text = text.replace(old, new)
          main.write_text(text)

          script = Path('scripts/window-check.sh')
          text = script.read_text()
          text = text.replace('excluded_titles=()\n', 'excluded_titles=()\nexcluded_wm_classes=()\n')
          awk_end = "  )\nfi\n\nis_excluded_title()"
          class_parse = '''  )
            mapfile -t excluded_wm_classes < <(
              awk '
                /^[[:space:]]*window_filters:[[:space:]]*$/ { in_window_filters = 1; in_exclude = 0; next }
                in_window_filters && /^[[:space:]]+exclude_wm_classes:[[:space:]]*$/ { in_exclude = 1; next }
                in_window_filters && in_exclude && /^[[:space:]]+-[[:space:]]*/ {
                  value = $0
                  sub(/^[[:space:]]*-[[:space:]]*/, "", value)
                  sub(/[[:space:]]+#.*$/, "", value)
                  gsub(/^[[:space:]\"'"'"']+|[[:space:]\"'"'"']+$/, "", value)
                  if (value != "") print tolower(value)
                  next
                }
                in_window_filters && in_exclude && $0 !~ /^[[:space:]]*$/ { in_exclude = 0 }
                in_window_filters && /^[^[:space:]]/ { in_window_filters = 0; in_exclude = 0 }
              ' "$config_file"
            )
          fi

          is_excluded_wm_class() {
            local candidate="${1,,}"
            local excluded
            for excluded in "${excluded_wm_classes[@]}"; do
              if [ "$candidate" = "$excluded" ]; then return 0; fi
            done
            return 1
          }

          is_excluded_title()'''
          if 'is_excluded_wm_class()' not in text:
              text = text.replace(awk_end, class_parse)
          needle = '''  wm_class_name="$(
              echo "$class_raw" \\
                | sed -n 's/^WM_CLASS(STRING) = "\\(.*\\)", "\\(.*\\)"$/\\2/p'
            )"

            # Extract PID if present.'''
          replacement = '''  wm_class_name="$(
              echo "$class_raw" \\
                | sed -n 's/^WM_CLASS(STRING) = "\\(.*\\)", "\\(.*\\)"$/\\2/p'
            )"

            wm_class_key="$wm_class_name"
            [ -n "$wm_class_key" ] || wm_class_key="$wm_class_instance"
            is_excluded_wm_class "$wm_class_key" && continue

            # Extract PID if present.'''
          if 'is_excluded_wm_class "$wm_class_key"' not in text:
              text = text.replace(needle, replacement)
          script.write_text(text)
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src-tauri/src/lib.rs src/controlStripModel.ts src/main.ts scripts/window-check.sh
          git diff --cached --quiet && exit 0
          git commit -m "Add Ignore from Strip context action"
          git push
